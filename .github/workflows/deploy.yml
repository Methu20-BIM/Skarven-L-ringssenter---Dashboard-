name: Deploy til GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:          # Kjør manuelt fra GitHub-nettsiden

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4

      - name: Konfigurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Last opp alle filer
        uses: actions/upload-pages-artifact@v3
        with:
          path: .          # Last opp hele repo-mappen

      - name: Publiser til GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
